databases:
  - name: job-tracker-db
    databaseName: job_tracker
    user: job_tracker_user
    plan: free

services:
  # Backend Service
  - type: web
    name: job-tracker-backend
    env: node
    plan: free
    rootDir: ./server
    buildCommand: npm install --include=dev && DATABASE_URL=postgresql://temp:temp@temp:5432/temp npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://job-tracker-frontend.onrender.com

  # Frontend Service
  - type: web
    name: job-tracker-frontend
    env: node
    plan: free
    rootDir: ./client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://job-tracker-backend.onrender.com/api
