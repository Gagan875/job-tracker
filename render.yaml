services:
  # PostgreSQL Database
  - type: pserv
    name: job-tracker-db
    plan: free
    databaseName: job_tracker
    databaseUser: job_tracker_user

  # Backend Service
  - type: web
    name: job-tracker-backend
    runtime: node
    plan: free
    rootDir: ./server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://job-tracker-frontend.onrender.com

  # Frontend Service
  - type: web
    name: job-tracker-frontend
    runtime: node
    plan: free
    rootDir: ./client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://job-tracker-backend.onrender.com/api
